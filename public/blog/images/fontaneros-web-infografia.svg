<svg width="1200" height="680" viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="680" fill="#1D1D1F"/>
  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="#34C759"/>

  <!-- Title -->
  <text x="600" y="72" font-size="34" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="-0.5">5 elementos clave de la web de un fontanero</text>
  <text x="600" y="108" font-size="17" fill="#86868B" text-anchor="middle">Para que traiga trabajo de verdad, no solo presencia online</text>

  <!-- Divider -->
  <rect x="80" y="130" width="1040" height="1" fill="#333333"/>

  <!-- ROW 1: 3 cards -->

  <!-- Card 1 -->
  <rect x="80" y="155" width="330" height="175" rx="14" fill="#ffffff" fill-opacity="0.05"/>
  <circle cx="126" cy="198" r="22" fill="#34C759" fill-opacity="0.18"/>
  <text x="126" y="205" font-size="20" font-weight="700" fill="#34C759" text-anchor="middle">1</text>
  <text x="162" y="198" font-size="16" font-weight="600" fill="#FFFFFF" dominant-baseline="middle">Teléfono visible</text>
  <text x="106" y="232" font-size="13" fill="#86868B">Grande, en la cabecera. Con botón</text>
  <text x="106" y="252" font-size="13" fill="#86868B">para llamar al instante desde el móvil.</text>

  <!-- Card 2 -->
  <rect x="435" y="155" width="330" height="175" rx="14" fill="#ffffff" fill-opacity="0.05"/>
  <circle cx="481" cy="198" r="22" fill="#34C759" fill-opacity="0.18"/>
  <text x="481" y="205" font-size="20" font-weight="700" fill="#34C759" text-anchor="middle">2</text>
  <text x="517" y="198" font-size="16" font-weight="600" fill="#FFFFFF" dominant-baseline="middle">Zona de cobertura</text>
  <text x="461" y="232" font-size="13" fill="#86868B">Tu barrio y ciudad, bien claros.</text>
  <text x="461" y="252" font-size="13" fill="#86868B">Google te posiciona donde trabajas.</text>

  <!-- Card 3 -->
  <rect x="790" y="155" width="330" height="175" rx="14" fill="#ffffff" fill-opacity="0.05"/>
  <circle cx="836" cy="198" r="22" fill="#34C759" fill-opacity="0.18"/>
  <text x="836" y="205" font-size="20" font-weight="700" fill="#34C759" text-anchor="middle">3</text>
  <text x="872" y="198" font-size="16" font-weight="600" fill="#FFFFFF" dominant-baseline="middle">Servicios detallados</text>
  <text x="816" y="232" font-size="13" fill="#86868B">Fugas, desatascos, calderas…</text>
  <text x="816" y="252" font-size="13" fill="#86868B">Cada servicio = una búsqueda en Google.</text>

  <!-- ROW 2: 2 cards centered -->

  <!-- Card 4 -->
  <rect x="207" y="355" width="330" height="175" rx="14" fill="#ffffff" fill-opacity="0.05"/>
  <circle cx="253" cy="398" r="22" fill="#34C759" fill-opacity="0.18"/>
  <text x="253" y="405" font-size="20" font-weight="700" fill="#34C759" text-anchor="middle">4</text>
  <text x="289" y="398" font-size="16" font-weight="600" fill="#FFFFFF" dominant-baseline="middle">Reseñas visibles</text>
  <text x="233" y="432" font-size="13" fill="#86868B">La prueba social que convierte</text>
  <text x="233" y="452" font-size="13" fill="#86868B">visitas en llamadas de verdad.</text>

  <!-- Card 5 -->
  <rect x="663" y="355" width="330" height="175" rx="14" fill="#ffffff" fill-opacity="0.05"/>
  <circle cx="709" cy="398" r="22" fill="#34C759" fill-opacity="0.18"/>
  <text x="709" y="405" font-size="20" font-weight="700" fill="#34C759" text-anchor="middle">5</text>
  <text x="745" y="398" font-size="16" font-weight="600" fill="#FFFFFF" dominant-baseline="middle">SEO local activo</text>
  <text x="689" y="432" font-size="13" fill="#86868B">Aparece cuando buscan</text>
  <text x="689" y="452" font-size="13" fill="#86868B">"fontanero + tu ciudad" en Google.</text>

  <!-- Footer -->
  <text x="600" y="614" font-size="13" fill="#555555" text-anchor="middle">yele.design — Webs para fontaneros desde 29€/mes · Lista en 3-5 días</text>
</svg>
